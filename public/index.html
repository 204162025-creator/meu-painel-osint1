<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel OSINT - Avançado</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 700px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        h1 {
            color: #58a6ff;
            text-align: center;
            margin-top: 0;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #8b949e;
        }
        input, select {
            width: 100%;
            padding: 10px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #fff;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #238636;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #2ea44f;
        }
        .resultado {
            margin-top: 20px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 15px;
            white-space: pre-wrap;
            font-family: monospace;
            display: none;
        }
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid #58a6ff;
            display: none;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📡 Painel OSINT</h1>
    
    <div class="input-group">
        <label for="type">Selecione o Alvo:</label>
        <select id="type">
            <option value="steam">Steam (Histórico de Nicks / ID)</option>
            <option value="tiktok">TikTok (Investigar Link de Vídeo)</option>
        </select>
    </div>

    <div class="input-group">
        <label for="target">Insira o ID Steam ou Link do TikTok:</label>
        <input type="text" id="target" placeholder="Ex: 76561198000000000 ou link do vídeo...">
    </div>

    <button onclick="buscarDados()">Investigar Alvo</button>

    <div id="resultado-box" class="resultado">
        <img id="user-avatar" class="avatar" src="" alt="Avatar">
        <div id="output"></div>
    </div>
</div>

<script>
    async function buscarDados() {
        const type = document.getElementById('type').value;
        const target = document.getElementById('target').value;
        const output = document.getElementById('output');
        const avatar = document.getElementById('user-avatar');
        const box = document.getElementById('resultado-box');

        if(!target) {
            alert('Por favor, digite o alvo!');
            return;
        }

        box.style.display = 'block';
        output.innerText = 'Buscando dados na database...';
        avatar.style.display = 'none';

        try {
            // Chama a sua API na Vercel de forma dinâmica
            const res = await fetch(`/api?type=${type}&target=${encodeURIComponent(target)}`);
            const data = await res.json();

            if(data.error) {
                output.innerText = `Erro: ${data.error}`;
                return;
            }

            // Se for Steam e tiver foto de perfil, mostra na tela
            if(data.avatar) {
                avatar.src = data.avatar;
                avatar.style.display = 'block';
            }

            // Organiza o texto bonitinho na tela
            output.innerText = JSON.stringify(data, null, 2);

        } catch (err) {
            output.innerText = 'Erro ao conectar com o servidor.';
        }
    }
</script>

</body>
</html>
